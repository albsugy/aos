name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release
  id-token: write   # npm Trusted Publishing (OIDC) — no token secret needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # Trusted publishing needs npm >= 11.5.1 and Node >= 22.14 — node 24 bundles both.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - run: npm ci
      - name: package.json version must match the tag
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          [ "$PKG" = "$GITHUB_REF_NAME" ] || { echo "::error::package.json is $PKG but the tag is $GITHUB_REF_NAME"; exit 1; }
      - name: verify — source
        run: npm run test:source
      - name: verify — compiled bundle
        run: npm run test:bundle
      - name: build release artifact (npm pack layout)
        run: |
          npm pack
          TGZ=$(ls albsugy-aos-*.tgz)
          mv "$TGZ" aos.tgz
          sha256sum aos.tgz > aos.tgz.sha256
          sha256sum -c aos.tgz.sha256
      - name: create GitHub release with artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes aos.tgz aos.tgz.sha256
      - name: publish to npm via Trusted Publishing (OIDC)
        # Requires the trusted publisher configured on npmjs.com:
        #   package Settings → Trusted Publisher → GitHub Actions
        #   owner: albsugy · repo: aos · workflow: release.yml · allowed action: npm publish
        # Provenance is enabled in package.json publishConfig; it needs id-token:
        # write (granted above) and a PUBLIC repo, so only release after the repo
        # is public — publishing provenance from a private repo fails.
        run: npm publish
