name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: smoke (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - name: smoke — source
        run: bash test/smoke.sh
      - name: smoke — compiled bundle
        run: AOS_BIN="node $PWD/dist/aos.mjs" bash test/smoke.sh

  dist-freshness:
    name: committed dist matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: dist/ must be rebuilt and committed with source changes
        run: |
          git diff --exit-code -- dist
          # git diff misses untracked files — catch new-but-uncommitted artifacts too
          test -z "$(git status --porcelain -- dist)" || { git status -- dist; exit 1; }

  shellcheck:
    name: shellcheck installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck install.sh test/smoke.sh
