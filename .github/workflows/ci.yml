name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - run: npm ci
      - name: smoke — source
        run: npm run test:source
      - name: smoke — compiled bundle
        run: npm run test:bundle

  dist-freshness:
    name: committed dist matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false
      - run: npm ci
      - run: npm run build
      - name: dist/ must be rebuilt and committed with source changes
        run: |
          git diff --exit-code -- dist
          # git diff misses untracked files — catch new-but-uncommitted artifacts too
          test -z "$(git status --porcelain -- dist)" || { git status -- dist; exit 1; }

  shellcheck:
    name: shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck install.sh test/smoke.sh scripts/release.sh
