# AOS project policy — gates, tiers, and verification contracts.
# Bash patterns are JavaScript regexes matched (case-insensitive) against commands.
# protected_paths patterns are globs matched against absolute and repo-relative paths.
version: 1

# auto: agent proceeds after writing plan.md
# ask:  file writes outside the run folder stay gated until the human runs `aos run approve`
plan_gate: auto

tiers:
  forbidden:
    # --force-with-lease is not matched here; it falls through to the gated git-push rule.
    # (?<=[\s'"]) also catches quoted flags ('-f') and -\w*f catches combined
    # short flags (-uf); the CLI additionally parses git invocations structurally.
    - pattern: 'push\s+[^|;&]*(--force(?!-with-lease)\b|(?<=[\s''"])-\w*f\b)'
      reason: Force-push is forbidden by policy (--force-with-lease is gated instead)
    - pattern: 'push\s+[^|;&]*\s\+\S'
      reason: Force-push via +refspec is forbidden by policy
    # rm -rf / and friends are ALSO caught structurally (flag permutations, sudo,
    # /* targets) by a built-in check — this regex is the readable baseline.
    - pattern: 'rm\s+-rf\s+(/|~)(\s|$)'
      reason: Recursive delete of root/home is forbidden by policy
  gated:
    - pattern: '\bgit\s+push\b'
      action: git-push
    - pattern: '\bgh\s+pr\s+merge\b'
      action: merge
    # Anchored to an invocation position so `cat docs/deploy.md` stays clean.
    - pattern: '(^|[;&|]\s*)(sudo\s+)?(\S*/)?deploy\b'
      action: deploy
    - pattern: '\b(npm|pnpm|yarn|make)\s+(run\s+)?deploy\b'
      action: deploy
    # Plan approval is the human's call: an agent running it hits this gate,
    # and approving the prompt IS the approval.
    # aos\.mjs also covers `node dist/aos.mjs run approve` in dev checkouts.
    - pattern: '\baos(\.mjs)?\s+run\s+approve\b'
      action: plan-approve
      reason: Plan approval is reserved for the human — approve only after reviewing plan.md
    # Closing a review works the same way: an agent (e.g. /aos-approve) reviews
    # the awaiting-review run and proposes the close; approving the prompt IS
    # your sign-off.
    - pattern: '\baos(\.mjs)?\s+run\s+state\s+(done|shipped)\b'
      action: review-close
      reason: Closing a review (done/shipped) is reserved for the human — the approval prompt is the sign-off
  # File writes are gated too. Built-in (always on): .claude/settings.json,
  # .git/hooks/, and AOS's own policy/audit/state files require approval, and
  # shell scripts being written are scanned for forbidden/gated commands.
  # Add your own globs here:
  protected_paths:
    []
    # - pattern: '.env*'
    #   decision: ask         # or: deny
    #   reason: Environment files hold secrets

verification:
  # When true, /aos-verify and /aos-ticket must spawn a skeptic subagent to refute the work.
  adversarial_review: true
  contracts:
    # Deterministic checks that must pass before a run can reach awaiting-review.
    # Examples:
    # - name: tests
    #   command: npm test
    #   required: true
    # - name: lint
    #   command: npm run lint
    #   required: false
    []
